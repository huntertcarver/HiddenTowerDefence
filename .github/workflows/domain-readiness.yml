name: Monitor domain readiness

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check authoritative delegation and HTTPS
        env:
          DOMAIN: hiddentowerdefence.com
          EXPECTED_NAMESERVERS: ${{ vars.CLOUD_DNS_NAMESERVERS || 'ns-cloud-b1.googledomains.com. ns-cloud-b2.googledomains.com. ns-cloud-b3.googledomains.com. ns-cloud-b4.googledomains.com.' }}
        run: |
          set -eu
          ACTUAL="$(dig +short NS "$DOMAIN" | sort | tr '\n' ' ')"
          echo "Observed authoritative nameservers: $ACTUAL"
          for NS in $EXPECTED_NAMESERVERS; do
            case "$ACTUAL" in *"$NS"*) ;; *) echo "Delegation pending for $NS"; exit 0;; esac
          done
          dig +short A "$DOMAIN" | grep -Fx "34.49.195.86"
          dig +short MX "$DOMAIN" | grep -Fx "10 fwd1.porkbun.com."
          dig +short TXT "$DOMAIN" | grep -F 'v=spf1 include:_spf.porkbun.com ~all'
          curl --fail --max-time 20 --retry 3 "https://$DOMAIN/health"
