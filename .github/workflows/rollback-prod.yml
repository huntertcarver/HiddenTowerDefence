name: Roll back production

on:
  workflow_dispatch:
    inputs:
      image_digest:
        description: Immutable Artifact Registry digest to restore
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: hiddentowerdefence-production
  cancel-in-progress: false

jobs:
  rollback:
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/588376054847/locations/global/workloadIdentityPools/hiddentower-github/providers/github-actions
          service_account: hiddentower-deployer-prod@smp-shared-prod.iam.gserviceaccount.com
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"
      - name: Reapply prior immutable image
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=smp-substrate-tfstate-prod" \
            -backend-config="prefix=products/hiddentowerdefence/prod"
          terraform apply -auto-approve -var="image_digest=${{ inputs.image_digest }}"
      - name: Verify rollback
        working-directory: infra/terraform
        run: |
          URL="$(terraform output -raw service_uri)"
          curl --fail --retry 5 --retry-delay 5 "$URL/health"
          curl --fail --retry 5 --retry-delay 5 "$URL/readyz"
